<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 ColorCar Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-coloring: #FFF8E7;
  --sky-blue: #87CEEB;
  --grass-green: #5CBF47;
  --asphalt: #6B6B6B;
  --btn-start: #FF6B35;
  --btn-start-shadow: #CC4400;
  --btn-again: #44AA44;
  --btn-again-shadow: #2d7a2d;
  --text-white: #FFFFFF;
  --hud-bg: rgba(0,0,0,0.45);
}
body {
  font-family: 'M PLUS Rounded 1c', 'Rounded Mplus 1c', sans-serif;
  font-weight: 800;
  background: var(--bg-coloring);
  overflow: hidden;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}

/* ─── COLORING SCREEN ─── */
#coloring-screen {
  display: flex; flex-direction: column; align-items: center;
  gap: 14px; padding: 16px;
  max-width: 600px; width: 100%;
  max-height: 100vh; overflow-y: auto;   /* 画面に収まらない時はスクロール */
}
#coloringCanvas, #coloring-canvas-wrap { max-width: 100%; }
/* 縦が低い端末向けにコンパクト化 */
@media (max-height: 720px) {
  #coloring-screen { gap: 10px; padding: 10px; }
  #coloring-screen h1 { font-size: clamp(16px, 4.5vw, 24px); }
}
#coloring-screen h1 {
  font-size: clamp(20px, 5vw, 32px);
  color: #FF6B35;
  text-shadow: 2px 2px 0 #CC4400;
}
#coloring-canvas-wrap {
  border: 5px solid #FF6B35;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 6px 0 #CC4400;
  cursor: crosshair;
  background: #fff;
}
#coloringCanvas { display: block; width: 100%; height: auto; }
#vehiclePicker {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
}
.vehicle-btn {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 18px; font-weight: 800;
  padding: 8px 14px; border-radius: 16px; cursor: pointer;
  border: 3px solid #FFB088; background: #fff; color: #CC4400;
  box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  user-select: none; -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s;
}
.vehicle-btn:hover { transform: scale(1.06); }
.vehicle-btn.selected {
  background: #FF6B35; color: #fff; border-color: #CC4400;
}
#palette {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
}
.color-swatch {
  width: 52px; height: 52px; border-radius: 50%;
  border: 4px solid transparent;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(0,0,0,0.25);
  transition: transform 0.1s, box-shadow 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected {
  border-color: #333;
  transform: scale(1.2);
  box-shadow: 0 2px 0 rgba(0,0,0,0.25);
}
.btn-big {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 28px; font-weight: 800;
  min-width: 200px; min-height: 70px;
  border: none; border-radius: 24px;
  padding: 14px 40px; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  color: #fff;
}
#startBtn {
  background: var(--btn-start);
  box-shadow: 0 7px 0 var(--btn-start-shadow);
}
#startBtn:active {
  transform: translateY(4px);
  box-shadow: 0 3px 0 var(--btn-start-shadow);
}
#againBtn {
  background: var(--btn-again);
  box-shadow: 0 7px 0 var(--btn-again-shadow);
}
#againBtn:active {
  transform: translateY(4px);
  box-shadow: 0 3px 0 var(--btn-again-shadow);
}

/* ─── RACE SCREEN ─── */
#race-screen {
  display: none; position: relative;
  width: 100vw; height: 100vh;
}
#race-screen canvas { display: block; }
#hud {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  background: var(--hud-bg); color: #fff; border-radius: 16px;
  padding: 10px 24px; font-size: clamp(16px, 3.5vw, 26px);
  display: flex; gap: 24px; align-items: center;
  white-space: nowrap; pointer-events: none;
}
#countdown {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: clamp(60px, 15vw, 120px); color: #fff;
  text-shadow: 0 0 20px rgba(0,0,0,0.8), 4px 4px 0 #FF6B35;
  pointer-events: none; display: none;
  animation: countPop 0.3s ease-out;
}
@keyframes countPop {
  from { transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
  to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
}
#goalScreen {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.82); color: #fff; border-radius: 28px;
  padding: 40px 60px; text-align: center; display: none; flex-direction: column;
  align-items: center; gap: 20px;
}
#goalScreen h1 { font-size: clamp(36px, 8vw, 64px); color: #FFD700; }
#goalScreen p  { font-size: clamp(18px, 4vw, 28px); }

/* Touch controls */
#touchLeft, #touchRight {
  position: absolute; bottom: 0; width: 50%; height: 45%;
  display: none; align-items: center; justify-content: center;
  font-size: 60px; opacity: 0.25; pointer-events: auto;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
#touchLeft  { left: 0; }
#touchRight { right: 0; }

/* Confetti */
.confetti {
  position: fixed; top: -10px; width: 12px; height: 12px;
  border-radius: 2px; pointer-events: none;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- ─── COLORING SCREEN ─── -->
<div id="coloring-screen">
  <h1>🎨 じぶんの くるまを ぬろう！</h1>
  <div id="vehiclePicker"></div>
  <div id="coloring-canvas-wrap">
    <canvas id="coloringCanvas" width="500" height="300"></canvas>
  </div>
  <div id="palette"></div>
  <button class="btn-big" id="startBtn">スタート！🏎️</button>
</div>

<!-- ─── RACE SCREEN ─── -->
<div id="race-screen">
  <div id="hud">
    <span>🏁 ラップ <b id="lapNum">1</b>/3</span>
    <span>⏱ <b id="timer">0:00</b></span>
    <span>🥇 <b id="rank">1</b>位</span>
  </div>
  <div id="countdown"></div>
  <div id="goalScreen">
    <h1>🎉 ゴール！</h1>
    <p id="finalTime">タイム: 0:00</p>
    <button class="btn-big" id="againBtn">もういちど！🎨</button>
  </div>
  <div id="touchLeft">◀</div>
  <div id="touchRight">▶</div>
</div>

<script>
// ════════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════════
let AC = null;
let bgmTimeout = null;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}

function startBGM() {
  if (!AC) return;
  if (AC.state === 'suspended') AC.resume();
  const BPM = 140;
  const notes = [
    [523,1],[659,1],[784,1],[880,2],
    [784,1],[659,1],[523,2],
    [440,1],[523,1],[659,1],[784,2],
    [659,1],[523,1],[440,4],
  ];
  let t = AC.currentTime + 0.1;
  const beat = 60 / BPM;
  function playLoop() {
    notes.forEach(([freq, dur]) => {
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.10, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + beat * dur * 0.85);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(t); osc.stop(t + beat * dur);
      t += beat * dur;
    });
    const delay = (t - AC.currentTime - 0.5) * 1000;
    bgmTimeout = setTimeout(playLoop, Math.max(delay, 100));
  }
  playLoop();
}

function stopBGM() {
  if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
}

function playSE(type) {
  if (!AC) return;
  if (AC.state === 'suspended') AC.resume();
  const se = {
    engine() {
      const osc = AC.createOscillator(), gain = AC.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, AC.currentTime);
      osc.frequency.linearRampToValueAtTime(160, AC.currentTime + 0.3);
      gain.gain.setValueAtTime(0.18, AC.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.4);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(); osc.stop(AC.currentTime + 0.4);
    },
    lap() {
      [523,659,784,1047].forEach((f,i) => {
        const osc = AC.createOscillator(), gain = AC.createGain();
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.2, AC.currentTime + i*0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + i*0.1 + 0.15);
        osc.connect(gain); gain.connect(AC.destination);
        osc.start(AC.currentTime + i*0.1);
        osc.stop(AC.currentTime + i*0.1 + 0.2);
      });
    },
    goal() {
      const fanfare = [[523,.15],[659,.15],[784,.15],[1047,.4],[988,.15],[1047,.5]];
      let t = AC.currentTime;
      fanfare.forEach(([f, dur]) => {
        const osc = AC.createOscillator(), gain = AC.createGain();
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
        osc.connect(gain); gain.connect(AC.destination);
        osc.start(t); osc.stop(t + dur);
        t += dur;
      });
    },
    count() {
      const osc = AC.createOscillator(), gain = AC.createGain();
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, AC.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.12);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(); osc.stop(AC.currentTime + 0.12);
    },
    go() {
      [523,784].forEach((f,i) => {
        const osc = AC.createOscillator(), gain = AC.createGain();
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.3, AC.currentTime + i*0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.3);
        osc.connect(gain); gain.connect(AC.destination);
        osc.start(AC.currentTime + i*0.05);
        osc.stop(AC.currentTime + 0.35);
      });
    },
  };
  se[type]?.();
}

// ════════════════════════════════════════════════════
//  COLORING
// ════════════════════════════════════════════════════
const PALETTE = [
  { hex: '#FF3333', label: 'あか' },
  { hex: '#FF8800', label: 'オレンジ' },
  { hex: '#FFE000', label: 'きいろ' },
  { hex: '#33CC33', label: 'みどり' },
  { hex: '#3366FF', label: 'あお' },
  { hex: '#9933CC', label: 'むらさき' },
  { hex: '#FF69B4', label: 'ピンク' },
  { hex: '#FFFFFF', label: 'しろ' },
  { hex: '#AAAAAA', label: 'グレー' },
  { hex: '#AA6600', label: 'ちゃいろ' },
  { hex: '#00DDDD', label: 'みずいろ' },
  { hex: '#111111', label: 'くろ' },
];

let selectedColor = PALETTE[0].hex;
const coloringCanvas = document.getElementById('coloringCanvas');
const cCtx = coloringCanvas.getContext('2d');

function hexToRGB(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ─── Vehicle types (働く車) ───
const VEHICLES = [
  { id: 'car',   label: '🚗 くるま' },
  { id: 'truck', label: '🚚 トラック' },
  { id: 'bus',   label: '🚌 バス' },
  { id: 'fire',  label: '🚒 しょうぼうしゃ' },
];
let currentVehicle = 'car';

const BASE = '#CCCCCC'; // ぬり対象の初期色（メイン）

function drawWheel(ctx, x, y, r) {
  ctx.fillStyle = '#222222';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(x, y, r*0.42, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, r*0.42, 0, Math.PI*2); ctx.stroke();
}
function headlight(ctx, x, y) {
  ctx.fillStyle = '#FFF6A0';
  ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.stroke();
}
function fillStroke(ctx, color) {
  ctx.fillStyle = color; ctx.fill();
  ctx.strokeStyle = '#333333'; ctx.lineWidth = 5; ctx.stroke();
}

function drawCarTemplate() {
  const ctx = cCtx;
  ctx.clearRect(0, 0, 500, 300);
  ({ car: drawCar, truck: drawTruck, bus: drawBus, fire: drawFire }[currentVehicle])(ctx);
}

function drawCar(ctx) {
  drawWheel(ctx, 150, 235, 38);
  drawWheel(ctx, 355, 235, 38);
  // body
  roundRect(ctx, 70, 165, 360, 80, 34); fillStroke(ctx, BASE);
  // cabin
  ctx.beginPath();
  ctx.moveTo(150, 170); ctx.lineTo(180, 95);
  ctx.quadraticCurveTo(190, 80, 215, 80);
  ctx.lineTo(310, 80);
  ctx.quadraticCurveTo(335, 80, 345, 95);
  ctx.lineTo(370, 170); ctx.closePath();
  fillStroke(ctx, BASE);
  // windows
  ctx.fillStyle = '#8CC8F0';
  ctx.beginPath();
  ctx.moveTo(190,160); ctx.lineTo(210,105);
  ctx.quadraticCurveTo(214,98,224,98); ctx.lineTo(248,98); ctx.lineTo(248,160); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(262,160); ctx.lineTo(262,98); ctx.lineTo(300,98);
  ctx.quadraticCurveTo(312,98,316,108); ctx.lineTo(330,160); ctx.closePath(); ctx.fill();
  headlight(ctx, 420, 185);
}

function drawTruck(ctx) {
  drawWheel(ctx, 130, 240, 36);
  drawWheel(ctx, 360, 240, 36);
  drawWheel(ctx, 405, 240, 36);
  // 荷台（うしろの大きな箱）
  roundRect(ctx, 60, 110, 230, 130, 16); fillStroke(ctx, BASE);
  // 運転席（前）
  roundRect(ctx, 300, 150, 140, 90, 18); fillStroke(ctx, BASE);
  // 運転席の窓
  ctx.fillStyle = '#8CC8F0';
  roundRect(ctx, 360, 162, 70, 45, 10); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
  roundRect(ctx, 360, 162, 70, 45, 10); ctx.stroke();
  headlight(ctx, 432, 222);
}

function drawBus(ctx) {
  drawWheel(ctx, 120, 240, 34);
  drawWheel(ctx, 380, 240, 34);
  // 長いボディ
  roundRect(ctx, 45, 95, 410, 150, 30); fillStroke(ctx, BASE);
  // 窓を横一列に
  ctx.fillStyle = '#8CC8F0';
  for (let i = 0; i < 4; i++) {
    const wx = 75 + i * 80;
    roundRect(ctx, wx, 120, 60, 55, 8); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    roundRect(ctx, wx, 120, 60, 55, 8); ctx.stroke();
  }
  // ドア
  ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
  ctx.strokeRect(395, 150, 50, 90);
  headlight(ctx, 440, 220);
}

function drawFire(ctx) {
  drawWheel(ctx, 130, 240, 36);
  drawWheel(ctx, 370, 240, 36);
  // ボディ（消防車：低めで長い）
  roundRect(ctx, 55, 150, 390, 95, 22); fillStroke(ctx, BASE);
  // 運転席
  roundRect(ctx, 330, 110, 115, 60, 16); fillStroke(ctx, BASE);
  // 運転席の窓
  ctx.fillStyle = '#8CC8F0';
  roundRect(ctx, 350, 122, 75, 38, 8); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
  roundRect(ctx, 350, 122, 75, 38, 8); ctx.stroke();
  // はしご（固定・グレー）
  ctx.strokeStyle = '#888'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(70, 140); ctx.lineTo(300, 110); ctx.stroke();
  ctx.lineWidth = 2;
  for (let i = 0; i <= 8; i++) {
    const t = i/8;
    const x = 70 + t*230, y = 140 - t*30;
    ctx.beginPath(); ctx.moveTo(x, y-7); ctx.lineTo(x, y+7); ctx.stroke();
  }
  // サイレン（固定・赤）
  ctx.fillStyle = '#FF2222';
  roundRect(ctx, 250, 138, 26, 16, 5); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  roundRect(ctx, 250, 138, 26, 16, 5); ctx.stroke();
  headlight(ctx, 435, 222);
}

function floodFill(startX, startY, fillHex) {
  const imageData = cCtx.getImageData(0, 0, coloringCanvas.width, coloringCanvas.height);
  const data = imageData.data;
  const W = coloringCanvas.width, H = coloringCanvas.height;
  const [fr, fg, fb] = hexToRGB(fillHex);
  const idx0 = (startY * W + startX) * 4;
  const tr = data[idx0], tg = data[idx0+1], tb = data[idx0+2], ta = data[idx0+3];
  if (tr===fr && tg===fg && tb===fb && ta===255) return;
  // don't fill dark outlines
  if (tr < 60 && tg < 60 && tb < 60 && ta > 200) return;
  // don't fill glass area (light blue windows #8CC8F0)
  if (tb > 215 && tr > 110 && tr < 185 && tg > 180 && tg < 225) return;

  const stack = [startY * W + startX];
  const visited = new Uint8Array(W * H);
  while (stack.length) {
    const i = stack.pop();
    if (visited[i]) continue;
    visited[i] = 1;
    const x = i % W, y = Math.floor(i / W);
    const p = i * 4;
    if (data[p] !== tr || data[p+1] !== tg || data[p+2] !== tb || data[p+3] !== ta) continue;
    // skip dark border pixels
    if (data[p] < 60 && data[p+1] < 60 && data[p+2] < 60 && data[p+3] > 200) continue;
    data[p]=fr; data[p+1]=fg; data[p+2]=fb; data[p+3]=255;
    if (x > 0)   stack.push(i-1);
    if (x < W-1) stack.push(i+1);
    if (y > 0)   stack.push(i-W);
    if (y < H-1) stack.push(i+W);
  }
  cCtx.putImageData(imageData, 0, 0);
}

// Build palette
const paletteEl = document.getElementById('palette');
PALETTE.forEach(p => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch';
  sw.style.background = p.hex;
  if (p.hex === '#FFFFFF') sw.style.border = '4px solid #ccc';
  sw.title = p.label;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
    selectedColor = p.hex;
  });
  paletteEl.appendChild(sw);
});
paletteEl.firstChild.classList.add('selected');

// Build vehicle picker (働く車)
const vehiclePickerEl = document.getElementById('vehiclePicker');
VEHICLES.forEach((v, i) => {
  const btn = document.createElement('div');
  btn.className = 'vehicle-btn' + (i === 0 ? ' selected' : '');
  btn.textContent = v.label;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.vehicle-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentVehicle = v.id;
    drawCarTemplate();
  });
  vehiclePickerEl.appendChild(btn);
});

coloringCanvas.addEventListener('click', e => {
  const rect = coloringCanvas.getBoundingClientRect();
  const scaleX = coloringCanvas.width / rect.width;
  const scaleY = coloringCanvas.height / rect.height;
  const x = Math.floor((e.clientX - rect.left) * scaleX);
  const y = Math.floor((e.clientY - rect.top) * scaleY);
  floodFill(x, y, selectedColor);
});

drawCarTemplate();

// ════════════════════════════════════════════════════
//  THREE.JS RACE
// ════════════════════════════════════════════════════
let scene, camera, renderer;
let playerCar, cpuCars = [];
let playerState, cpuStates = [];
let gameRunning = false;
let raceStartTime = 0;
let animFrameId = null;

// ── 複雑なサーキット（曲線で定義）──
const TRACK_HALF = 9;        // コース半幅（車はこの内側を走る）
const TRACK_N = 500;         // サンプル数
let TRACK_SAMPLES = [];      // {x,z,tx,tz} 中央線の点と進行方向
let trackCurve = null;

function buildTrackCurve() {
  // 半径をうねらせて複雑なコースにする（自己交差しない範囲）
  const pts = [];
  const M = 16;
  for (let k = 0; k < M; k++) {
    const th = k / M * Math.PI * 2;
    const r = 70 + 22 * Math.sin(3 * th + 0.6) + 8 * Math.sin(5 * th);
    pts.push(new THREE.Vector3(r * Math.cos(th), 0, r * 0.82 * Math.sin(th)));
  }
  trackCurve = new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);
  TRACK_SAMPLES = [];
  for (let i = 0; i < TRACK_N; i++) {
    const t = i / TRACK_N;
    const p = trackCurve.getPointAt(t);
    const tan = trackCurve.getTangentAt(t);
    TRACK_SAMPLES.push({ x: p.x, z: p.z, tx: tan.x, tz: tan.z });
  }
}

function nearestIdx(x, z) {
  let best = 0, bd = Infinity;
  for (let i = 0; i < TRACK_SAMPLES.length; i++) {
    const s = TRACK_SAMPLES[i];
    const dx = x - s.x, dz = z - s.z;
    const d = dx*dx + dz*dz;
    if (d < bd) { bd = d; best = i; }
  }
  return best;
}

const TOTAL_LAPS = 3;
const CPU_COLORS = [0xFF4444, 0x4488FF, 0xFF8800, 0xAA44FF];

const CAR_CONFIG = {
  maxSpeed: 0.28,
  acceleration: 0.009,
  friction: 0.97,
  turnSpeed: 0.038,
};

const keys = { left: false, right: false, up: false, down: false };

function createToyCar(texture, color, type = 'car') {
  const group = new THREE.Group();
  let bodyMat;
  if (texture) {
    bodyMat = new THREE.MeshLambertMaterial({ map: texture });
  } else {
    bodyMat = new THREE.MeshLambertMaterial({ color });
  }
  const darkMat  = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const rimMat   = new THREE.MeshLambertMaterial({ color: 0xFFD700 });
  const grayMat  = new THREE.MeshLambertMaterial({ color: 0x999999 });
  const glassMat = new THREE.MeshLambertMaterial({ color: 0x99CCFF, transparent: true, opacity: 0.7 });

  function addWheel(x, z) {
    const wheelGeo = new THREE.CylinderGeometry(0.42, 0.42, 0.32, 14);
    const rimGeo   = new THREE.CylinderGeometry(0.18, 0.18, 0.34, 10);
    const w = new THREE.Mesh(wheelGeo, darkMat);
    w.rotation.z = Math.PI/2; w.position.set(x, 0.35, z); group.add(w);
    const r = new THREE.Mesh(rimGeo, rimMat);
    r.rotation.z = Math.PI/2; r.position.set(x, 0.35, z); group.add(r);
  }

  if (type === 'truck') {
    // cargo box (back) + cab (front)
    const cargo = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.3, 2.2), bodyMat);
    cargo.position.set(0, 0.85, -0.7); group.add(cargo);
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.0, 1.3), bodyMat);
    cab.position.set(0, 0.7, 1.4); group.add(cab);
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.45, 0.08), glassMat);
    glass.position.set(0, 0.95, 2.05); group.add(glass);
    addWheel(0.97, 1.3); addWheel(-0.97, 1.3);
    addWheel(0.97, -1.0); addWheel(-0.97, -1.0);
  } else if (type === 'bus') {
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.9, 1.5, 4.2), bodyMat);
    body.position.set(0, 0.95, 0); group.add(body);
    // window strip
    for (let i = 0; i < 3; i++) {
      const g = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.5, 0.9), glassMat);
      g.position.set(0.96, 1.1, -1.2 + i*1.2); group.add(g);
      const g2 = g.clone(); g2.position.x = -0.96; group.add(g2);
    }
    const front = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.5, 0.08), glassMat);
    front.position.set(0, 1.2, 2.1); group.add(front);
    addWheel(0.97, 1.4); addWheel(-0.97, 1.4);
    addWheel(0.97, -1.4); addWheel(-0.97, -1.4);
  } else if (type === 'fire') {
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.0, 3.6), bodyMat);
    body.position.set(0, 0.7, -0.2); group.add(body);
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.7, 1.0), bodyMat);
    cab.position.set(0, 1.25, 1.2); group.add(cab);
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.4, 0.08), glassMat);
    glass.position.set(0, 1.3, 1.7); group.add(glass);
    // ladder
    const ladder = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 3.0), grayMat);
    ladder.position.set(0, 1.35, -0.6); group.add(ladder);
    // siren
    const siren = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.3), new THREE.MeshLambertMaterial({ color: 0xFF2222 }));
    siren.position.set(0, 1.7, 1.2); group.add(siren);
    addWheel(0.97, 1.2); addWheel(-0.97, 1.2);
    addWheel(0.97, -1.2); addWheel(-0.97, -1.2);
  } else {
    // car
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.65, 3.5), bodyMat);
    body.position.y = 0.5; group.add(body);
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.6, 2.0), bodyMat);
    cabin.position.set(0, 1.1, 0.3); group.add(cabin);
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 0.08), glassMat);
    glass.position.set(0, 1.15, 1.3); group.add(glass);
    addWheel(0.97, 1.2); addWheel(-0.97, 1.2);
    addWheel(0.97, -1.2); addWheel(-0.97, -1.2);
  }

  group.castShadow = true;
  return group;
}

function buildScene(paintTexture) {
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x87CEEB, 160, 420);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.75));
  const sun = new THREE.DirectionalLight(0xFFF4CC, 1.2);
  sun.position.set(50, 80, 30);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  scene.add(sun);

  // Sky
  renderer.setClearColor(0x87CEEB);

  // Grass
  const grassGeo = new THREE.PlaneGeometry(700, 700);
  const grassMat = new THREE.MeshLambertMaterial({ color: 0x5CBF47 });
  const grass = new THREE.Mesh(grassGeo, grassMat);
  grass.rotation.x = -Math.PI/2; grass.receiveShadow = true;
  scene.add(grass);

  // Track — 複雑なサーキット（曲線）
  buildTrackCurve();
  buildTrack();

  // Decorations
  addDecorations();

  // コース上の指定位置に車を配置
  function placeOnTrack(obj, idx, lane) {
    const s = TRACK_SAMPLES[((idx % TRACK_N) + TRACK_N) % TRACK_N];
    const nx = -s.tz, nz = s.tx;  // 左方向の単位法線
    obj.position.set(s.x + nx * lane, 0.1, s.z + nz * lane);
    obj.rotation.y = Math.atan2(s.tx, s.tz);
  }

  // Player car（スタートライン）
  playerCar = createToyCar(paintTexture, null, currentVehicle);
  placeOnTrack(playerCar, 0, 0);
  scene.add(playerCar);
  playerState = { speed: 0, lap: 0, passedHalf: false, finished: false, prevIdx: 0 };

  // CPU cars（別レーン・別の速さ・少し後ろに整列）
  const cpuTypes  = ['truck', 'bus', 'fire', 'car'];
  const cpuLanes  = [-3.5, 3.5, -3.5];
  const cpuSpeedF = [0.90, 1.02, 0.96];
  for (let i = 0; i < 3; i++) {
    const car = createToyCar(null, CPU_COLORS[i], cpuTypes[i % cpuTypes.length]);
    placeOnTrack(car, -8 * (i + 1), cpuLanes[i]);  // スタート手前に整列
    scene.add(car);
    cpuCars.push(car);
    cpuStates.push({
      speed: 0, passedHalf: false, lap: 0, finished: false, prevIdx: 0,
      lane: cpuLanes[i], speedFactor: cpuSpeedF[i],
    });
  }
}

function buildTrack() {
  const roadMat = new THREE.MeshLambertMaterial({ color: 0x454545 });
  const lineMat = new THREE.MeshLambertMaterial({ color: 0xFFFFFF });
  const kerbRed = new THREE.MeshLambertMaterial({ color: 0xE03030 });
  const roadW = TRACK_HALF * 2;          // コース幅（広め）
  const step = 4;                         // 何サンプルごとに1区間を作るか（軽量化）

  for (let i = 0; i < TRACK_N; i += step) {
    const s0 = TRACK_SAMPLES[i];
    const s1 = TRACK_SAMPLES[(i + step) % TRACK_N];
    const cx = (s0.x + s1.x) / 2, cz = (s0.z + s1.z) / 2;
    const dx = s1.x - s0.x, dz = s1.z - s0.z;
    const len = Math.hypot(dx, dz) + 0.4;
    const ang = Math.atan2(dx, dz);
    const nx = -s0.tz, nz = s0.tx;        // 左方向の単位法線

    const seg = new THREE.Mesh(new THREE.PlaneGeometry(roadW, len), roadMat);
    seg.rotation.x = -Math.PI/2; seg.rotation.z = -ang;
    seg.position.set(cx, 0.01, cz); seg.receiveShadow = true;
    scene.add(seg);

    // 白い路肩ライン（両端）
    [roadW/2 - 0.6, -(roadW/2 - 0.6)].forEach(side => {
      const edge = new THREE.Mesh(new THREE.PlaneGeometry(0.8, len), lineMat);
      edge.rotation.x = -Math.PI/2; edge.rotation.z = -ang;
      edge.position.set(cx + nx*side, 0.02, cz + nz*side);
      scene.add(edge);
    });

    // 外側の赤白カーブ
    const kerbMat = ((i / step) % 2 === 0) ? kerbRed : lineMat;
    [roadW/2 + 0.8, -(roadW/2 + 0.8)].forEach(side => {
      const kerb = new THREE.Mesh(new THREE.PlaneGeometry(1.4, len), kerbMat);
      kerb.rotation.x = -Math.PI/2; kerb.rotation.z = -ang;
      kerb.position.set(cx + nx*side, 0.015, cz + nz*side);
      scene.add(kerb);
    });

    // センターの白い点線
    if ((i / step) % 2 === 0) {
      const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.5, len * 0.5), lineMat);
      dash.rotation.x = -Math.PI/2; dash.rotation.z = -ang;
      dash.position.set(cx, 0.02, cz);
      scene.add(dash);
    }
  }

  // スタート/フィニッシュの市松模様
  const s = TRACK_SAMPLES[0];
  const nx = -s.tz, nz = s.tx;
  const ang = Math.atan2(s.tx, s.tz);
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < 9; c++) {
      const col = ((r + c) % 2 === 0) ? 0x111111 : 0xFFFFFF;
      const sq = new THREE.Mesh(new THREE.PlaneGeometry(roadW/9, 1.1),
        new THREE.MeshLambertMaterial({ color: col }));
      sq.rotation.x = -Math.PI/2; sq.rotation.z = -ang;
      const side = (c - 4) * (roadW/9);
      sq.position.set(s.x + nx*side + s.tx*(r*1.1), 0.03, s.z + nz*side + s.tz*(r*1.1));
      scene.add(sq);
    }
  }

  // フェンス（外周）
  const fenceMat = new THREE.MeshLambertMaterial({ color: 0xFFFFFF });
  const postMat  = new THREE.MeshLambertMaterial({ color: 0xDD4444 });
  for (let i = 0; i < TRACK_N; i += 12) {
    const sp = TRACK_SAMPLES[i];
    const npx = -sp.tz, npz = sp.tx;
    const off = roadW/2 + 2.5;
    [off, -off].forEach(o => {
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.25,1.3,0.25), postMat);
      post.position.set(sp.x + npx*o, 0.65, sp.z + npz*o);
      scene.add(post);
      const rail = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.18, 5.0), fenceMat);
      rail.position.set(sp.x + npx*o, 0.95, sp.z + npz*o);
      rail.rotation.y = Math.atan2(sp.tx, sp.tz);
      scene.add(rail);
    });
  }
}

// コースの外側に装飾を散らす（コースに被らない位置に）
function scatterOutside(count, fn) {
  for (let k = 0; k < count; k++) {
    const idx = Math.floor(Math.random() * TRACK_N);
    const sp = TRACK_SAMPLES[idx];
    const npx = -sp.tz, npz = sp.tx;
    const side = (Math.random() < 0.5 ? 1 : -1) * (TRACK_HALF + 6 + Math.random() * 14);
    fn(sp.x + npx*side, sp.z + npz*side);
  }
}

function addDecorations() {
  // きのこ
  scatterOutside(14, (x, z) => {
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1.2,8),
      new THREE.MeshLambertMaterial({ color: 0xEEDDBB }));
    stem.position.set(x, 0.6, z); scene.add(stem);
    const cap = new THREE.Mesh(new THREE.SphereGeometry(1.0, 10, 8, 0, Math.PI*2, 0, Math.PI/2),
      new THREE.MeshLambertMaterial({ color: 0xFF2222 }));
    cap.position.set(x, 1.4, z); scene.add(cap);
    for (let i = 0; i < 4; i++) {
      const spot = new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),
        new THREE.MeshLambertMaterial({ color: 0xFFFFFF }));
      const a = (i/4)*Math.PI*2;
      spot.position.set(x + Math.cos(a)*0.55, 1.7, z + Math.sin(a)*0.55);
      scene.add(spot);
    }
  });

  // ヤシの木
  scatterOutside(16, (x, z) => {
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.35, 4, 8),
      new THREE.MeshLambertMaterial({ color: 0x8B6914 }));
    trunk.position.set(x, 2, z); scene.add(trunk);
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.8, 8, 6),
      new THREE.MeshLambertMaterial({ color: 0x33AA22 }));
    leaves.scale.y = 0.6; leaves.position.set(x, 4.5, z); scene.add(leaves);
  });

  // 岩
  scatterOutside(8, (x, z) => {
    const rock = new THREE.Mesh(new THREE.SphereGeometry(1.2 + Math.random()*0.5, 7, 6),
      new THREE.MeshLambertMaterial({ color: 0x888877 }));
    rock.scale.set(1, 0.65 + Math.random()*0.3, 1.2 + Math.random()*0.3);
    rock.position.set(x, 0.5, z); scene.add(rock);
  });
}

function updateCamera() {
  const offset = new THREE.Vector3(0, 4.5, -9);
  offset.applyQuaternion(playerCar.quaternion);
  const targetPos = playerCar.position.clone().add(offset);
  camera.position.lerp(targetPos, 0.1);
  camera.lookAt(playerCar.position.x, playerCar.position.y + 1.2, playerCar.position.z);
}

// コースの中央線(楕円)から一定距離内に車を押し戻す
const CAR_KEEP = TRACK_HALF - 1.5;   // 車を留める半幅（路肩より内側）
function constrainToTrack(pos) {
  const i = nearestIdx(pos.x, pos.z);
  const s = TRACK_SAMPLES[i];
  const dx = pos.x - s.x, dz = pos.z - s.z;
  const dist = Math.hypot(dx, dz);
  if (dist > CAR_KEEP) {
    pos.x = s.x + dx / dist * CAR_KEEP;
    pos.z = s.z + dz / dist * CAR_KEEP;
    return true; // はみ出した
  }
  return false;
}

function updatePlayerCar() {
  if (!gameRunning || playerState.finished) return;
  playerState.speed = Math.min(playerState.speed + CAR_CONFIG.acceleration, CAR_CONFIG.maxSpeed);
  playerState.speed *= CAR_CONFIG.friction;
  // ── オートステア（常時ON）：コースの少し先のサンプル点を狙って沿う ──
  const pos = playerCar.position;
  const i = nearestIdx(pos.x, pos.z);
  const look = TRACK_SAMPLES[(i + 14) % TRACK_N];           // 少し先の中央線
  let desired = Math.atan2(look.x - pos.x, look.z - pos.z);
  let d = desired - playerCar.rotation.y;
  d = Math.atan2(Math.sin(d), Math.cos(d));                 // -π..π
  // 中央線からズレているほど強く補正（はみ出し防止）
  const cs = TRACK_SAMPLES[i];
  const off = Math.hypot(pos.x - cs.x, pos.z - cs.z);
  const autoRate = Math.min(0.30, 0.16 + off * 0.03);
  playerCar.rotation.y += d * autoRate;

  // 手動操作はその上に乗せる小さなハンドル補助（道の中で左右に寄れる）
  const manual = CAR_CONFIG.turnSpeed * Math.max(0.4, playerState.speed / CAR_CONFIG.maxSpeed);
  if (keys.left)  playerCar.rotation.y += manual;
  if (keys.right) playerCar.rotation.y -= manual;

  const dir = new THREE.Vector3(0,0,1).applyQuaternion(playerCar.quaternion);
  playerCar.position.addScaledVector(dir, playerState.speed);
  // コースの外に出ないように押し戻す（出たら少し減速）
  if (constrainToTrack(playerCar.position)) playerState.speed *= 0.85;
  playerCar.position.y = 0.1;
}

function updateCPUCar(car, state) {
  if (!gameRunning || state.finished) return;

  // コース曲線のルックアヘッドで滑らかに操舵（くるくる回らない）
  const pos = car.position;
  const i = nearestIdx(pos.x, pos.z);
  const look = TRACK_SAMPLES[(i + 14) % TRACK_N];
  const lane = state.lane || 0;
  // 先の点をレーン分だけ横にずらす（左方向法線）
  const tx = look.x + (-look.tz) * lane;
  const tz = look.z + ( look.tx) * lane;

  let desired = Math.atan2(tx - pos.x, tz - pos.z);
  let d = desired - car.rotation.y;
  d = Math.atan2(Math.sin(d), Math.cos(d));   // -π..π
  car.rotation.y += d * 0.14;                  // 比例制御（振動しない）

  // 個体ごとに速さを変えて隊列をバラけさせる（ゴムバンドは弱め）
  const base = CAR_CONFIG.maxSpeed * (state.speedFactor || 1);
  const rubber = base + (playerState.speed - CAR_CONFIG.maxSpeed * 0.5) * 0.12;
  state.speed = Math.min(state.speed + 0.006, Math.max(rubber, 0.05));

  const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion);
  car.position.addScaledVector(dir, state.speed);
  constrainToTrack(car.position);
  car.position.y = 0.1;
}

function checkLap(car, state, isPlayer) {
  if (state.finished) return;
  const i = nearestIdx(car.position.x, car.position.z);
  // コース中盤を通過したらフラグを立てる
  if (i > TRACK_N * 0.4 && i < TRACK_N * 0.6) state.passedHalf = true;
  // スタートライン付近を「後半→前半」に通過したら1周
  const wrapped = state.prevIdx > TRACK_N * 0.8 && i < TRACK_N * 0.2;
  if (wrapped && state.passedHalf) {
    state.lap++;
    state.passedHalf = false;
    if (isPlayer) {
      if (state.lap >= TOTAL_LAPS) {
        triggerGoal();
      } else {
        playSE('lap');
        document.getElementById('lapNum').textContent = state.lap + 1;
      }
    }
  }
  state.prevIdx = i;
}

function getRank() {
  // 周回数＋コース上の進み具合で順位を判定
  const prog = s => s.lap + (s.prevIdx || 0) / TRACK_N;
  const p = prog(playerState);
  let rank = 1;
  cpuStates.forEach(s => { if (prog(s) > p) rank++; });
  return rank;
}

let timerInterval = null;
function startTimer() {
  raceStartTime = Date.now();
  timerInterval = setInterval(() => {
    if (!gameRunning) return;
    const elapsed = Math.floor((Date.now() - raceStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 500);
}

function triggerGoal() {
  gameRunning = false;
  playerState.finished = true;
  stopBGM();
  playSE('goal');
  spawnConfetti();
  const elapsed = Math.floor((Date.now() - raceStartTime) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  document.getElementById('finalTime').textContent = `タイム: ${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('goalScreen').style.display = 'flex';
}

function spawnConfetti() {
  const colors = ['#FF4444','#FFD700','#44FF44','#4488FF','#FF69B4'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `left:${Math.random()*100}vw;background:${colors[i%5]};animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6000);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startCountdown() {
  const el = document.getElementById('countdown');
  for (const text of ['3','2','1','GO！']) {
    el.textContent = text;
    el.style.display = 'block';
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'countPop 0.3s ease-out';
    playSE(text === 'GO！' ? 'go' : 'count');
    await sleep(1000);
  }
  el.style.display = 'none';
  startBGM();
  startTimer();
  playSE('engine');
  gameRunning = true;
}

function gameLoop() {
  animFrameId = requestAnimationFrame(gameLoop);
  updatePlayerCar();
  cpuCars.forEach((car, i) => updateCPUCar(car, cpuStates[i]));
  checkLap(playerCar, playerState, true);
  cpuCars.forEach((car, i) => checkLap(car, cpuStates[i], false));
  document.getElementById('rank').textContent = getRank();
  updateCamera();
  renderer.render(scene, camera);
}

function initRenderer() {
  const W = window.innerWidth, H = window.innerHeight;
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  document.getElementById('race-screen').prepend(renderer.domElement);

  camera = new THREE.PerspectiveCamera(65, W/H, 0.1, 500);
  camera.position.set(60, 6, -10);

  window.addEventListener('resize', () => {
    const W2 = window.innerWidth, H2 = window.innerHeight;
    camera.aspect = W2/H2; camera.updateProjectionMatrix();
    renderer.setSize(W2, H2);
  });
}

function startRace(paintTexture) {
  document.getElementById('coloring-screen').style.display = 'none';
  const rs = document.getElementById('race-screen');
  rs.style.display = 'block';

  // Show touch controls on mobile
  if ('ontouchstart' in window) {
    document.getElementById('touchLeft').style.display = 'flex';
    document.getElementById('touchRight').style.display = 'flex';
  }

  initRenderer();
  buildScene(paintTexture);
  gameLoop();
  startCountdown();
}

function backToColoring() {
  stopBGM();
  if (timerInterval) clearInterval(timerInterval);
  gameRunning = false;
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }

  // Cleanup Three.js
  if (renderer) { renderer.domElement.remove(); renderer.dispose(); renderer = null; }
  scene = null; camera = null;
  playerCar = null; cpuCars = []; cpuStates = [];
  playerState = null;

  document.getElementById('goalScreen').style.display = 'none';
  document.getElementById('lapNum').textContent = '1';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('rank').textContent = '1';
  document.getElementById('touchLeft').style.display = 'none';
  document.getElementById('touchRight').style.display = 'none';

  document.getElementById('race-screen').style.display = 'none';
  document.getElementById('coloring-screen').style.display = 'flex';
  drawCarTemplate();
}

// ─── Input ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') keys.up    = true;
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') keys.down  = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') keys.up    = false;
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') keys.down  = false;
});

// Touch controls
const touchL = document.getElementById('touchLeft');
const touchR = document.getElementById('touchRight');
touchL.addEventListener('touchstart', e => { e.preventDefault(); keys.left  = true; },  { passive: false });
touchL.addEventListener('touchend',   e => { e.preventDefault(); keys.left  = false; }, { passive: false });
touchR.addEventListener('touchstart', e => { e.preventDefault(); keys.right = true; },  { passive: false });
touchR.addEventListener('touchend',   e => { e.preventDefault(); keys.right = false; }, { passive: false });

// Start button
// ぬりえ画像を3Dの車のテクスチャにする（塗った通りに反映）
function makePaintTexture() {
  const off = document.createElement('canvas');
  off.width = coloringCanvas.width;
  off.height = coloringCanvas.height;
  const o = off.getContext('2d');
  o.fillStyle = '#ffffff';            // 透明部分は白で埋める
  o.fillRect(0, 0, off.width, off.height);
  o.drawImage(coloringCanvas, 0, 0);  // ぬった絵を重ねる
  const tex = new THREE.CanvasTexture(off);
  tex.needsUpdate = true;
  return tex;
}

document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  if (AC && AC.state === 'suspended') AC.resume();
  startRace(makePaintTexture());
});

// Again button
document.getElementById('againBtn').addEventListener('click', () => {
  backToColoring();
});
</script>
</body>
</html>
